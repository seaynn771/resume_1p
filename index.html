<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>履歷表</title>

<style>

body{
    font-family:"Microsoft JhengHei", sans-serif;
    margin:0;
    background:#eef2f3;
}

/* 整體動畫 */
.resume{
    width:900px;
    margin:30px auto;
    background:white;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* 左側 */
.sidebar{
    width:30%;
    background:linear-gradient(180deg,#2c3e50,#4ca1af);
    color:white;
    padding:25px;
    text-align:center;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    border:3px solid white;
}

/* 技能條 */
.skill-bar{
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}

.skill-fill{
    height:8px;
    background:#fff;
    width:0;
    animation:fillBar 2s forwards;
}

@keyframes fillBar{
    to{width:80%;}
}

/* 右側 */
.content{
    width:70%;
    padding:30px;
}

.section{
    margin-bottom:25px;
    animation:fadeIn 1s ease;
}

.section h2{
    border-left:5px solid #4ca1af;
    padding-left:10px;
}

/* 按鈕 */
.music-btn{
    margin-top:20px;
    padding:10px 14px;
    border:none;
    border-radius:20px;
    background:#4ca1af;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.music-btn:hover{
    background:#2c3e50;
}

</style>

</head>

<body>

<!-- 🎵 背景音樂 -->
<audio id="bgm" autoplay loop playsinline>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("bgm");

// 音量淡入
function fadeIn(audio){
  let volume = 0;
  audio.volume = 0;
  const fade = setInterval(() => {
    if(volume < 1){
      volume += 0.05;
      audio.volume = volume;
    }else{
      clearInterval(fade);
    }
  }, 200);
}

// 自動播放處理
audio.play().catch(() => {
  audio.muted = true;
  audio.play();

  setTimeout(() => {
    audio.muted = false;
    fadeIn(audio);
  }, 100);
});

// 控制音樂
function toggleMusic(){
  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}
</script>

<div class="resume">

<!-- 左 -->
<div class="sidebar">
<img src="photo.jpg" class="profile-img">

<h2>林雅萍</h2>
<p>亞洲大學 學生</p>

<h3>技能</h3>

<div>Word / PPT</div>

<div>HTML / CSS</div>
<div class="skill-bar"><div class="skill-fill"></div></div>

<button class="music-btn" onclick="toggleMusic()">播放 / 暫停音樂</button>

</div>

<div class="content">

能快速適應環境並完成任務。
</p>
</div>

<div class="section">
<h2>學歷</h2>
<p>亞洲大學（就讀中）</p>
</div>

<div class="section">
<h2>經歷</h2>
<ul>
<li>簡報設計</li>
<li>團隊合作</li>
<li>Canva設計</li>
</ul>
</div>

<div class="section">
<h2>音樂來源</h2>
<p>背景音樂由 Suno AI 生成，僅供學習用途。</p>
</div>

</div>

</div>
